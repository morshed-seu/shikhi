spring.application.name=shikhi
server.port=8080

# Actuator: expose health (with liveness/readiness probes), info, and Prometheus metrics.
# Observability skeleton per ADR-0009; secured/hardened in later milestones.
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when-authorized

# --- Data tier (M1) — PostgreSQL + Flyway (ADR-0003) ---
# Local defaults match docker-compose; override via env in every other environment.
spring.datasource.url=${SHIKHI_DB_URL:jdbc:postgresql://localhost:5432/shikhi}
spring.datasource.username=${SHIKHI_DB_USER:shikhi}
spring.datasource.password=${SHIKHI_DB_PASSWORD:shikhi}
# Flyway owns the schema; Hibernate only validates that entities match it.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true

# --- Security / auth (M1) — in-house JWT + rotating refresh (ADR-0005) ---
# SECRET MUST come from a secret manager/env in real environments; this dev default is
# insecure and only lets the app boot locally. HS256 needs >= 32 bytes.
shikhi.security.jwt.secret=${SHIKHI_JWT_SECRET:dev-only-insecure-secret-change-me-please-0123456789abcdef}
shikhi.security.jwt.issuer=shikhi
# Access token 15m, refresh token 30d (ISO-8601 durations) — approved M0 review.
shikhi.security.jwt.access-ttl=PT15M
shikhi.security.jwt.refresh-ttl=P30D

# --- Hardening (Phase E) ---
# CORS allowlist for the browser SPA (comma-separated origins). Empty = same-origin only.
shikhi.security.cors.allowed-origins=${SHIKHI_CORS_ORIGINS:}
# Auth-endpoint abuse protection (per-client token bucket): 10 req burst, refills 10/min.
# In-process (single instance / pilot); scale-out needs a shared Redis bucket — see runbook.
shikhi.security.rate-limit.enabled=${SHIKHI_RATE_LIMIT_ENABLED:true}
shikhi.security.rate-limit.capacity=${SHIKHI_RATE_LIMIT_CAPACITY:10}
shikhi.security.rate-limit.refill-tokens=${SHIKHI_RATE_LIMIT_REFILL:10}
shikhi.security.rate-limit.refill-period-seconds=${SHIKHI_RATE_LIMIT_PERIOD:60}
# Guest (anonymous) accounts: reaped once idle longer than guest-ttl. Daily at 03:00.
shikhi.identity.guest-ttl=${SHIKHI_GUEST_TTL:P30D}
shikhi.identity.guest-reaper-cron=${SHIKHI_GUEST_REAPER_CRON:0 0 3 * * *}

# Correlation id in every log line so a client error report ties back to server logs.
logging.pattern.level=%5p [correlationId=%X{correlationId:-none}]
