# Local development profile — active by default for `./gradlew bootRun` (see build.gradle).
# The local database is entirely migration/seed-driven and disposable, so allow Flyway to clean
# it. DevFlywayRecoveryConfig uses this to self-heal: if a migration's checksum no longer matches
# what the local DB recorded (e.g. you edited a seed migration that had already been applied
# locally while iterating), it cleans the schema and re-applies every migration instead of
# aborting startup with "Migration checksum mismatch". This keeps `bootRun` from breaking
# mid-development.
#
# DEV-ONLY. application-prod.properties keeps clean disabled, and DevFlywayRecoveryConfig is
# @Profile("dev"), so a real database can never be cleaned this way. Integration tests use fresh
# Testcontainers (no persistent state to mismatch).
spring.flyway.clean-disabled=false
