# Production profile overrides (activate with SPRING_PROFILES_ACTIVE=prod).
# Structured, centralizable JSON logs in the ECS schema (docs/70 §5). MDC entries — including
# the request correlationId — are emitted automatically, so a log line ties back to a request.
logging.structured.format.console=ecs

# Never expose health internals to anonymous callers in production.
management.endpoint.health.show-details=when-authorized
