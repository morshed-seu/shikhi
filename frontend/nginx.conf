# Serves the built SPA and reverse-proxies the JSON API to the backend container, so the
# browser talks to a single origin. `BACKEND_ORIGIN` is templated from an env var at
# container start (nginx:alpine runs /docker-entrypoint.d/ envsubst on *.template files);
# here we keep it simple with a fixed upstream name resolved by docker-compose DNS.

server {
    listen 80;
    server_name _;

    # Static SPA assets with a history-API fallback (client-side routing).
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API + actuator → backend service (docker-compose service name `backend`).
    location /v1/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /actuator/ {
        proxy_pass http://backend:8080;
    }
}
